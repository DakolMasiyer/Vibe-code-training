<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coding: Production Apps — Full Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6cff;
    --accent2: #ff6c6c;
    --accent3: #6cffb8;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --code-bg: #0d0d18;
    --gold: #ffd060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  /* LAYOUT */
  .app { display: flex; height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.3s ease;
  }

  .sidebar.collapsed { width: 60px; min-width: 60px; }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar.collapsed .sidebar-header { padding: 24px 12px 16px; }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: -0.3px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .logo-text { transition: opacity 0.2s; }
  .sidebar.collapsed .logo-text { opacity: 0; width: 0; overflow: hidden; }

  .progress-bar-wrap {
    margin-top: 12px;
    transition: opacity 0.2s;
  }
  .sidebar.collapsed .progress-bar-wrap { opacity: 0; pointer-events: none; }

  .progress-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .nav-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .phase-group { margin-bottom: 4px; }

  .phase-header {
    padding: 10px 20px 6px;
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: padding 0.3s;
  }

  .sidebar.collapsed .phase-header { padding: 10px 12px 6px; }
  .sidebar.collapsed .phase-label { display: none; }

  .phase-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .nav-item {
    padding: 9px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }

  .sidebar.collapsed .nav-item { padding: 9px 12px; justify-content: center; }

  .nav-item:hover { background: var(--surface2); }

  .nav-item.active {
    background: rgba(124, 108, 255, 0.1);
    border-left-color: var(--accent);
  }

  .nav-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    width: 20px;
    flex-shrink: 0;
    text-align: right;
  }

  .nav-item.active .nav-num { color: var(--accent); }

  .nav-title {
    font-size: 12px;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
    transition: opacity 0.2s;
  }

  .sidebar.collapsed .nav-title { opacity: 0; width: 0; overflow: hidden; display: none; }

  .nav-done {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--bg);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .nav-item.done .nav-done { opacity: 1; }

  .toggle-btn {
    position: absolute;
    right: -12px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--muted);
    z-index: 10;
    transition: all 0.2s;
  }

  .toggle-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow-y: auto;
    position: relative;
  }

  .content-area {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 40px 80px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* LESSON HEADER */
  .lesson-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .phase-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(124, 108, 255, 0.15);
    color: var(--accent);
    border: 1px solid rgba(124, 108, 255, 0.3);
  }

  .lesson-num-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .lesson-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lesson-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--text) 60%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .lesson-subtitle {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 600px;
  }

  /* SECTION CARDS */
  .section {
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .section:hover { border-color: rgba(124, 108, 255, 0.4); }

  .section-header {
    padding: 16px 20px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .section-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    flex: 1;
  }

  .section-chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.25s;
  }

  .section.open .section-chevron { transform: rotate(180deg); }

  .section-body {
    padding: 0 20px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s;
    background: var(--surface2);
  }

  .section.open .section-body {
    max-height: 3000px;
    padding: 20px;
  }

  /* TYPOGRAPHY IN SECTIONS */
  .section-body p {
    font-size: 14px;
    line-height: 1.75;
    color: #c8c8d8;
    margin-bottom: 12px;
  }

  .section-body h4 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin: 16px 0 8px;
    letter-spacing: 0.3px;
  }

  .section-body ul, .section-body ol {
    padding-left: 20px;
    margin-bottom: 12px;
  }

  .section-body li {
    font-size: 13px;
    line-height: 1.7;
    color: #c8c8d8;
    margin-bottom: 4px;
  }

  .section-body strong { color: var(--text); font-weight: 500; }

  /* CODE BLOCKS */
  .code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 12px 0;
    overflow: hidden;
  }

  .code-header {
    display: flex;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    flex: 1;
  }

  .copy-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .copy-btn:hover { color: var(--accent3); border-color: var(--accent3); }
  .copy-btn.copied { color: var(--accent3); border-color: var(--accent3); }

  .code-content {
    padding: 16px;
    overflow-x: auto;
  }

  .code-content pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: #c8d3f5;
    white-space: pre;
  }

  .kw { color: #c099ff; }
  .str { color: #c3e88d; }
  .cm { color: #636da6; font-style: italic; }
  .fn { color: #82aaff; }
  .var { color: #ff98a4; }
  .num { color: #ff966c; }
  .op { color: #89ddff; }

  /* CALLOUT BOXES */
  .callout {
    border-radius: 8px;
    padding: 14px 16px;
    margin: 12px 0;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .callout-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .callout-text {
    font-size: 13px;
    line-height: 1.6;
    color: #c8c8d8;
  }

  .callout.warning {
    background: rgba(255, 108, 108, 0.08);
    border: 1px solid rgba(255, 108, 108, 0.25);
  }

  .callout.tip {
    background: rgba(108, 255, 184, 0.08);
    border: 1px solid rgba(108, 255, 184, 0.25);
  }

  .callout.info {
    background: rgba(124, 108, 255, 0.08);
    border: 1px solid rgba(124, 108, 255, 0.25);
  }

  .callout.gold {
    background: rgba(255, 208, 96, 0.08);
    border: 1px solid rgba(255, 208, 96, 0.25);
  }

  /* ASSIGNMENT BOX */
  .assignment-box {
    background: linear-gradient(135deg, rgba(124, 108, 255, 0.1), rgba(108, 255, 184, 0.05));
    border: 1px solid rgba(124, 108, 255, 0.4);
    border-radius: 12px;
    padding: 20px;
    margin-top: 16px;
  }

  .assignment-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .task-list { list-style: none; padding: 0; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
  }

  .task-item:last-child { border-bottom: none; }

  .task-checkbox {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 2px;
  }

  .task-item.checked .task-checkbox {
    background: var(--accent3);
    border-color: var(--accent3);
    color: var(--bg);
    font-size: 10px;
  }

  .task-text {
    font-size: 13px;
    line-height: 1.5;
    color: #c8c8d8;
    transition: color 0.2s;
  }

  .task-item.checked .task-text {
    color: var(--muted);
    text-decoration: line-through;
  }

  /* NAVIGATION BUTTONS */
  .lesson-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .nav-btn.primary:hover { background: #6a5af0; }

  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { border-color: var(--border); color: var(--text); }

  .mark-done-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--accent3);
    background: rgba(108, 255, 184, 0.08);
    color: var(--accent3);
  }

  .mark-done-btn:hover { background: rgba(108, 255, 184, 0.15); }
  .mark-done-btn.done { background: var(--accent3); color: var(--bg); }

  /* HOME SCREEN */
  .home-screen { animation: fadeIn 0.4s ease; }

  .hero-section {
    text-align: center;
    padding: 60px 0 40px;
  }

  .hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .hero-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 48px;
    letter-spacing: -1px;
    line-height: 1.05;
    margin-bottom: 16px;
  }

  .hero-title span { color: var(--accent); }

  .hero-sub {
    font-size: 16px;
    color: var(--muted);
    max-width: 500px;
    margin: 0 auto 40px;
    line-height: 1.6;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 48px;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--text);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .phase-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }

  .phase-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .phase-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .phase-card-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-bottom: 12px;
  }

  .phase-card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .phase-card-sub {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .phase-card-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .start-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .start-btn:hover { background: #6a5af0; transform: translateY(-1px); }

  /* TABLE */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 12px;
  }

  .data-table th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: #c8c8d8;
    vertical-align: top;
    line-height: 1.5;
  }

  .data-table tr:hover td { background: rgba(255,255,255,0.02); }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }

  .tag-accent { background: rgba(124,108,255,0.2); color: var(--accent); }
  .tag-green { background: rgba(108,255,184,0.15); color: var(--accent3); }
  .tag-red { background: rgba(255,108,108,0.15); color: var(--accent2); }
  .tag-gold { background: rgba(255,208,96,0.15); color: var(--gold); }

  /* NOTES FAB */
  .notes-fab {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 98;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 18px;
    border-radius: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }
  .notes-fab:hover { border-color: var(--accent); color: var(--accent); }
  .notes-fab.visible { display: flex; }

  /* NOTES DRAWER */
  .notes-backdrop {
    position: fixed;
    inset: 0;
    z-index: 99;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .notes-backdrop.open { opacity: 1; pointer-events: all; }

  .notes-drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 360px;
    z-index: 100;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  .notes-drawer.open { transform: translateX(0); }

  .notes-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .notes-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
  }
  .notes-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .notes-close:hover { color: var(--text); }

  .notes-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 20px 20px;
    gap: 10px;
    overflow: hidden;
  }
  .notes-textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    padding: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-textarea:focus { border-color: var(--accent); }

          supabaseResponse = NextResponse.<span class="fn">next</span>({ request })

<span class="kw">import</span> { NextResponse } <span class="kw">from</span> <span class="str">'next/server'</span>
<span class="kw">import</span> { createClient } <span class="kw">from</span> <span class="str">'@supabase/supabase-js'</span>

<span class="kw">export async function</span> <span class="fn">GET</span>(request: Request) {
  <span class="cm">// Verify this is called by Vercel Cron, not a random user</span>
  <span class="kw">const</span> authHeader = request.headers.<span class="fn">get</span>(<span class="str">'authorization'</span>)
  <span class="kw">if</span> (authHeader !== <span class="str">\`Bearer \${process.env.CRON_SECRET}\`</span>) {
    <span class="kw">return</span> NextResponse.<span class="fn">json</span>({ error: <span class="str">'Unauthorized'</span> }, { status: <span class="num">401</span> })
  }

  <span class="cm">// Use service role to bypass RLS for admin operations</span>
  <span class="kw">const</span> supabase = <span class="fn">createClient</span>(
    process.env.<span class="var">NEXT_PUBLIC_SUPABASE_URL</span>!,
    process.env.<span class="var">SUPABASE_SERVICE_ROLE_KEY</span>!
  )

  <span class="cm">// Delete soft-deleted tracks older than 30 days</span>
  <span class="kw">const</span> thirtyDaysAgo = <span class="kw">new</span> <span class="fn">Date</span>()
  thirtyDaysAgo.<span class="fn">setDate</span>(thirtyDaysAgo.<span class="fn">getDate</span>() - <span class="num">30</span>)

  <span class="kw">const</span> { data: deletedTracks } = <span class="kw">await</span> supabase
    .from(<span class="str">'tracks'</span>)
    .<span class="fn">select</span>(<span class="str">'id, file_url'</span>)
    .<span class="fn">not</span>(<span class="str">'deleted_at'</span>, <span class="str">'is'</span>, <span class="kw">null</span>)
    .<span class="fn">lt</span>(<span class="str">'deleted_at'</span>, thirtyDaysAgo.<span class="fn">toISOString</span>())

  <span class="kw">if</span> (deletedTracks?.length) {
    <span class="cm">// Delete files from storage</span>
    <span class="kw">const</span> paths = deletedTracks.<span class="fn">map</span>(t => t.file_url)
    <span class="kw">await</span> supabase.storage
      .<span class="fn">from</span>(<span class="str">'audio-files'</span>)
      .<span class="fn">remove</span>(paths)

    <span class="cm">// Hard delete DB rows</span>
    <span class="kw">const</span> ids = deletedTracks.<span class="fn">map</span>(t => t.id)
    <span class="kw">await</span> supabase.from(<span class="str">'tracks'</span>).<span class="fn">delete</span>().<span class="fn">in</span>(<span class="str">'id'</span>, ids)
  }

  <span class="kw">return</span> NextResponse.<span class="fn">json</span>({
    cleaned: deletedTracks?.length ?? <span class="num">0</span>,
    timestamp: <span class="kw">new</span> <span class="fn">Date</span>().<span class="fn">toISOString</span>()
  })
}

// ============================================================
// STATE
// ============================================================
let currentLessonId = null
let completedLessons = new Set(JSON.parse(localStorage.getItem('completed') || '[]'))
let completedTasks = JSON.parse(localStorage.getItem('tasks') || '{}')

function saveState() {
  localStorage.setItem('completed', JSON.stringify([...completedLessons]))
  localStorage.setItem('tasks', JSON.stringify(completedTasks))
}

// ============================================================
// ALL LESSONS FLAT
// ============================================================
const allLessons = curriculum.flatMap(phase =>
  phase.lessons.map(l => ({ ...l, phase: phase.phase, phaseColor: phase.color, phaseNum: phase.phaseNum }))
)

// ============================================================
// SIDEBAR
// ============================================================
function buildSidebar() {
  const nav = document.getElementById('nav-scroll')
  nav.innerHTML = ''

  curriculum.forEach(phase => {
    const group = document.createElement('div')
    group.className = 'phase-group'

    const header = document.createElement('div')
    header.className = 'phase-header'
    header.innerHTML = `
      <div class="phase-dot" style="background:${phase.color}"></div>
      <span class="phase-label">Phase ${phase.phaseNum}: ${phase.phase}</span>
    `
    group.appendChild(header)

    phase.lessons.forEach(lesson => {
      const item = document.createElement('div')
      item.className = `nav-item ${lesson.id === currentLessonId ? 'active' : ''} ${completedLessons.has(lesson.id) ? 'done' : ''}`
      item.innerHTML = `
        <span class="nav-num">${String(lesson.id).padStart(2, '0')}</span>
        <span class="nav-title">${lesson.title}</span>
        <div class="nav-done">✓</div>
      `
      item.onclick = () => showLesson(lesson.id)
      group.appendChild(item)
    })

    nav.appendChild(group)
  })

  updateProgress()
}

function updateProgress() {
  const total = allLessons.length
  const done = completedLessons.size
  const pct = Math.round((done / total) * 100)
  document.getElementById('progress-fill').style.width = pct + '%'
  document.getElementById('progress-pct').textContent = pct + '%'
}

// ============================================================
// TOGGLE SIDEBAR (desktop collapse)
// ============================================================
let sidebarOpen = true
function toggleSidebar() {
  if (window.innerWidth <= 768) return
  sidebarOpen = !sidebarOpen
  const sb = document.getElementById('sidebar')
  const btn = document.getElementById('toggle-btn')
  if (sidebarOpen) {
    sb.classList.remove('collapsed')
    btn.textContent = '◀'
  } else {
    sb.classList.add('collapsed')
    btn.textContent = '▶'
  }
}

// ============================================================
// MOBILE SIDEBAR
// ============================================================
function toggleMobileSidebar() {
  const sb = document.getElementById('sidebar')
  const isOpen = sb.classList.contains('mobile-open')
  isOpen ? closeMobileSidebar() : openMobileSidebar()
}

function openMobileSidebar() {
  document.getElementById('sidebar').classList.add('mobile-open')
  document.getElementById('mobile-sb-backdrop').classList.add('open')
  document.getElementById('hamburger').textContent = '×'
}

function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open')
  document.getElementById('mobile-sb-backdrop').classList.remove('open')
  document.getElementById('hamburger').textContent = '☰'
}

// ============================================================
// HOME SCREEN
// ============================================================
function showHome() {
  currentLessonId = null
  closeNotes()
  closeMobileSidebar()
  document.getElementById('notes-fab').classList.remove('visible')
  buildSidebar()

  const content = document.getElementById('content-area')
  content.innerHTML = `
    <div class="home-screen">
      <div class="hero-section">
        <div class="hero-eyebrow">Your Stack · Your App · Production</div>
        <h1 class="hero-title">Vibe Coding<br><span>Production Apps</span></h1>
        <p class="hero-sub">End-to-end curriculum for building SyncMaster and fintech apps with Next.js 14, Supabase, and Claude Code.</p>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-num">17</div>
            <div class="stat-label">Lessons</div>
          </div>
          <div class="stat">
            <div class="stat-num">5</div>
            <div class="stat-label">Phases</div>
          </div>
          <div class="stat">
            <div class="stat-num">~20h</div>
            <div class="stat-label">Total Time</div>
          </div>
          <div class="stat">
            <div class="stat-num">${completedLessons.size}</div>
            <div class="stat-label">Completed</div>
          </div>
        </div>
        <button class="start-btn" onclick="showLesson(${completedLessons.size > 0 ? [...completedLessons].sort().pop() + 1 || 1 : 1})">
          ${completedLessons.size > 0 ? '▶ Continue Learning' : '▶ Start Lesson 1'}
        </button>
      </div>

      <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:16px;letter-spacing:-0.3px">Course Phases</h2>
      <div class="phase-cards">
        ${curriculum.map(phase => `
          <div class="phase-card" onclick="showLesson(${phase.lessons[0].id})">
            <div class="phase-dot phase-card-dot" style="background:${phase.color}"></div>
            <div class="phase-card-title">Phase ${phase.phaseNum}: ${phase.phase}</div>
            <div class="phase-card-sub">${getPhaseDesc(phase.phaseNum)}</div>
            <div class="phase-card-count">${phase.lessons.length} lessons · ${getPhaseDuration(phase)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `
}

function getPhaseDesc(n) {
  return ['Mental models, spec engineering, and project architecture.',
    'Next.js App Router, Supabase full setup, design system.',
    'Auth, schema, file uploads, server actions.',
    'Admin panel, email, cron jobs, payments + fintech.',
    'Env management, security hardening, launch checklist.'][n - 1]
}

function getPhaseDuration(phase) {
  const mins = phase.lessons.reduce((sum, l) => sum + parseInt(l.time), 0)
  return mins >= 60 ? Math.floor(mins / 60) + 'h ' + (mins % 60 || '') + (mins % 60 ? 'min' : '') : mins + 'min'
}

// ============================================================
// SHOW LESSON
// ============================================================
function showLesson(id) {
  currentLessonId = id
  const lesson = allLessons.find(l => l.id === id)
  if (!lesson) return
  closeMobileSidebar()
  buildSidebar()

  const prevLesson = allLessons.find(l => l.id === id - 1)
  const nextLesson = allLessons.find(l => l.id === id + 1)

  const content = document.getElementById('content-area')
  content.innerHTML = `
    <div class="lesson-meta">
      <span class="phase-badge">Phase ${lesson.phaseNum}: ${lesson.phase}</span>
      <span class="lesson-num-badge">Lesson ${lesson.id} of ${allLessons.length}</span>
      <span class="lesson-time">⏱ ${lesson.time}</span>
    </div>
    <h1 class="lesson-title">${lesson.title}</h1>
    <p class="lesson-subtitle">${lesson.subtitle}</p>

    ${lesson.sections.map((s, i) => `
      <div class="section ${i === 0 ? 'open' : ''}" id="section-${id}-${i}">
        <div class="section-header" onclick="toggleSection('section-${id}-${i}')">
          <div class="section-icon" style="background:${s.color}">${s.icon}</div>
          <span class="section-label">${s.label}</span>
          <span class="section-chevron">▼</span>
        </div>
        <div class="section-body">${s.content}</div>
      </div>
    `).join('')}

    <div class="lesson-nav">
      <button class="nav-btn" onclick="${prevLesson ? `showLesson(${prevLesson.id})` : 'showHome()'}" >
        ← ${prevLesson ? 'Previous' : 'Home'}
      </button>
      <button class="mark-done-btn ${completedLessons.has(id) ? 'done' : ''}" id="done-btn-${id}" onclick="markDone(${id})">
        ${completedLessons.has(id) ? '✓ Completed' : 'Mark Complete'}
      </button>
      <button class="nav-btn primary" onclick="${nextLesson ? `showLesson(${nextLesson.id})` : 'showHome()'}" >
        ${nextLesson ? 'Next →' : 'Finish 🎉'}
      </button>
    </div>
  `

  // Restore task states
  const taskKey = `lesson-${id}`
  if (completedTasks[taskKey]) {
    completedTasks[taskKey].forEach(idx => {
      const taskItems = document.querySelectorAll('.task-item')
      if (taskItems[idx]) taskItems[idx].classList.add('checked')
    })
  }

  document.getElementById('notes-fab').classList.add('visible')
  content.scrollTop = 0
  document.getElementById('main').scrollTop = 0
}

// ============================================================
// TOGGLE SECTION
// ============================================================
function toggleSection(id) {
  const section = document.getElementById(id)
  section.classList.toggle('open')
}

// ============================================================
// MARK DONE
// ============================================================
function markDone(id) {
  const wasComplete = completedLessons.has(id)
  if (wasComplete) {
    completedLessons.delete(id)
  } else {
    completedLessons.add(id)
  }
  saveState()
  buildSidebar()
  const btn = document.getElementById(`done-btn-${id}`)
  if (btn) {
    btn.classList.toggle('done', completedLessons.has(id))
    btn.textContent = completedLessons.has(id) ? '✓ Completed' : 'Mark Complete'
  }

  // Check for phase completion (only when marking complete, not un-marking)
  if (!wasComplete) {
    const phase = curriculum.find(p => p.lessons.some(l => l.id === id))
    if (phase) {
      const allPhaseLessonsDone = phase.lessons.every(l => completedLessons.has(l.id))
      if (allPhaseLessonsDone) showPhaseComplete(phase)
    }
  }
}

// ============================================================
// PHASE COMPLETION
// ============================================================
const phaseMessages = [
  'You\'ve internalized the vibe coding mental model. The mental shift from bricklayer to architect is done. Time to build.',
  'Your project skeleton is wired up and deployed. Next.js, Supabase, and your design system are all in place. Now let\'s build real features.',
  'Auth, schema, file uploads, server components — all wired up. You have a working product. Time to make it production-grade.',
  'Admin panel, transactional email, background jobs, payments. This is a real product. One phase left.',
  'You shipped. Not a tutorial project. Not a side project you\'ll "finish someday." A production app. 🚀'
]
const phaseGlyphs = ['🧠', '🏗️', '⚡', '🔧', '🚀']
let phaseCompleteTargetLesson = null

function showPhaseComplete(phase) {
  const nextPhase = curriculum.find(p => p.phaseNum === phase.phaseNum + 1)
  phaseCompleteTargetLesson = nextPhase ? nextPhase.lessons[0].id : null

  document.getElementById('pc-glyph').textContent = phaseGlyphs[phase.phaseNum - 1]
  document.getElementById('pc-eyebrow').textContent = `Phase ${phase.phaseNum} Complete`
  document.getElementById('pc-title').textContent = `${phase.phase} — Done.`
  document.getElementById('pc-msg').textContent = phaseMessages[phase.phaseNum - 1]

  const nextBtn = document.getElementById('pc-next-btn')
  if (nextPhase) {
    nextBtn.textContent = `Start Phase ${nextPhase.phaseNum}: ${nextPhase.phase} →`
  } else {
    nextBtn.textContent = 'Back to Home 🏁'
  }

  // Small delay so the mark-complete button state settles first
  setTimeout(() => {
    document.getElementById('phase-complete-overlay').classList.add('show')
  }, 400)
}

function dismissPhaseComplete() {
  document.getElementById('phase-complete-overlay').classList.remove('show')
}

function phaseCompleteNext() {
  dismissPhaseComplete()
  if (phaseCompleteTargetLesson) {
    setTimeout(() => showLesson(phaseCompleteTargetLesson), 250)
  } else {
    setTimeout(() => showHome(), 250)
  }
}

// ============================================================
// TOGGLE TASK
// ============================================================
function toggleTask(el) {
  el.classList.toggle('checked')
  const checkbox = el.querySelector('.task-checkbox')
  checkbox.textContent = el.classList.contains('checked') ? '✓' : ''

  const taskKey = `lesson-${currentLessonId}`
  const allTasks = [...document.querySelectorAll('.task-item')]
  const checkedIndices = allTasks
    .map((t, i) => t.classList.contains('checked') ? i : -1)
    .filter(i => i !== -1)
  completedTasks[taskKey] = checkedIndices
  saveState()
}

// ============================================================
// NOTES DRAWER
// ============================================================
let notesTimer = null

function openNotes() {
  const drawer = document.getElementById('notes-drawer')
  const backdrop = document.getElementById('notes-backdrop')
  const ta = document.getElementById('notes-textarea')
  const lesson = allLessons.find(l => l.id === currentLessonId)
  document.getElementById('notes-title').textContent =
    lesson ? `Notes — Lesson ${lesson.id}` : 'Notes'
  ta.value = currentLessonId
    ? (localStorage.getItem(`notes-${currentLessonId}`) || '')
    : ''
  updateNotesChars()
  drawer.classList.add('open')
  backdrop.classList.add('open')
  ta.focus()
}

function closeNotes() {
  document.getElementById('notes-drawer').classList.remove('open')
  document.getElementById('notes-backdrop').classList.remove('open')
}

function updateNotesChars() {
  const ta = document.getElementById('notes-textarea')
  document.getElementById('notes-chars').textContent = ta.value.length + ' chars'
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  updateNotesChars()
  const status = document.getElementById('notes-status')
  status.textContent = ''
  clearTimeout(notesTimer)
  notesTimer = setTimeout(() => {
    if (currentLessonId) {
      localStorage.setItem(`notes-${currentLessonId}`, document.getElementById('notes-textarea').value)
    }
    status.textContent = '✓ Saved'
    setTimeout(() => { status.textContent = '' }, 1500)
  }, 500)
})

// ============================================================
// COPY CODE
// ============================================================
function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre')
  const text = pre.innerText || pre.textContent
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'COPIED!'
    btn.classList.add('copied')
    setTimeout(() => {
      btn.textContent = 'COPY'
      btn.classList.remove('copied')
    }, 2000)
  })
}

// ============================================================
// KEYBOARD NAV
// ============================================================
document.addEventListener('keydown', (e) => {
  const tag = document.activeElement.tagName
  if (tag === 'TEXTAREA' || tag === 'INPUT') return

  if (e.key === 'ArrowRight' && currentLessonId) {
    const next = allLessons.find(l => l.id === currentLessonId + 1)
    if (next) showLesson(next.id)
  }
  if (e.key === 'ArrowLeft' && currentLessonId) {
    const prev = allLessons.find(l => l.id === currentLessonId - 1)
    if (prev) showLesson(prev.id)
    else showHome()
  }
  if (e.key === 'Escape') {
    const overlayOpen = document.getElementById('phase-complete-overlay').classList.contains('show')
    const drawerOpen = document.getElementById('notes-drawer').classList.contains('open')
    if (overlayOpen) dismissPhaseComplete()
    else if (drawerOpen) closeNotes()
    else showHome()
  }
  if (e.key === 'n' || e.key === 'N') {
    if (currentLessonId) {
      const drawerOpen = document.getElementById('notes-drawer').classList.contains('open')
      drawerOpen ? closeNotes() : openNotes()
    }
  }
})

// ============================================================

document.querySelector('.logo').addEventListener('click', showHome)

// ============================================================
showHome()
